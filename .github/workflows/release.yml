name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build UniqueMeleeWeapons.sln -c Release

      - name: Stage mod files
        # Reuse the .csproj's StageMod target — the single source of truth for what
        # files constitute the mod — so the release zip can never drift from the
        # local deploy (e.g. forget Patches). StageMod wipes + recopies $(StageDir).
        run: >
          dotnet build Source/1.6/UniqueMeleeWeapons.csproj -c Release
          -t:StageMod -p:StageDir=${{ github.workspace }}/release/UniqueMeleeWeapons

      - name: Package mod
        run: |
          set -e
          cd release && zip -r ../UniqueMeleeWeapons-${GITHUB_REF_NAME}.zip UniqueMeleeWeapons

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: UniqueMeleeWeapons-${{ github.ref_name }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, '-rc') }}
